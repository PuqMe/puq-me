apiVersion: apps/v1
kind: Deployment
metadata:
  name: puqme-websocket
spec:
  replicas: 2
  selector:
    matchLabels:
      app: puqme-websocket
  template:
    metadata:
      labels:
        app: puqme-websocket
    spec:
      containers:
        - name: websocket
          image: ghcr.io/puqme/websocket:latest
          ports:
            - containerPort: 3010
          env:
            - name: NODE_ENV
              value: production
          envFrom:
            - secretRef:
                name: puqme-websocket-secrets
          resources:
            requests:
              cpu: 150m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
---
apiVersion: v1
kind: Service
metadata:
  name: puqme-websocket
spec:
  selector:
    app: puqme-websocket
  ports:
    - name: ws
      port: 80
      targetPort: 3010
