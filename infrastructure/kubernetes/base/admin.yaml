apiVersion: apps/v1
kind: Deployment
metadata:
  name: puqme-admin
spec:
  replicas: 2
  selector:
    matchLabels:
      app: puqme-admin
  template:
    metadata:
      labels:
        app: puqme-admin
    spec:
      containers:
        - name: admin
          image: ghcr.io/puqme/admin:latest
          ports:
            - containerPort: 3002
          env:
            - name: NODE_ENV
              value: production
          envFrom:
            - secretRef:
                name: puqme-admin-secrets
          resources:
            requests:
              cpu: 100m
              memory: 192Mi
            limits:
              cpu: 400m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: puqme-admin
spec:
  selector:
    app: puqme-admin
  ports:
    - name: http
      port: 80
      targetPort: 3002
