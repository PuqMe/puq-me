services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 15s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5

  api:
    image: ghcr.io/puqme/api:${APP_IMAGE_TAG}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DEV_MOCK_MODE: "false"
      PORT: 3000
      HOST: 0.0.0.0
      LOG_LEVEL: info
      APP_ORIGIN: ${APP_ORIGIN}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_REGION: ${S3_REGION}
      S3_BUCKET: ${S3_BUCKET}
      STORAGE_AVATARS_BUCKET: ${STORAGE_AVATARS_BUCKET}
      STORAGE_IMAGES_BUCKET: ${STORAGE_IMAGES_BUCKET}
      STORAGE_CHAT_MEDIA_BUCKET: ${STORAGE_CHAT_MEDIA_BUCKET}
      STORAGE_BACKUPS_BUCKET: ${STORAGE_BACKUPS_BUCKET}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL}
      CDN_BASE_URL: ${CDN_BASE_URL}
      MALWARE_SCAN_HOOK_URL: ${MALWARE_SCAN_HOOK_URL}
      MEDIA_MAX_UPLOAD_SIZE_BYTES: ${MEDIA_MAX_UPLOAD_SIZE_BYTES}
      MEDIA_MAX_PROFILE_PHOTOS: ${MEDIA_MAX_PROFILE_PHOTOS}
      UPLOAD_AVATAR_MAX_BYTES: ${UPLOAD_AVATAR_MAX_BYTES}
      UPLOAD_IMAGE_MAX_BYTES: ${UPLOAD_IMAGE_MAX_BYTES}
      UPLOAD_CHAT_MEDIA_MAX_BYTES: ${UPLOAD_CHAT_MEDIA_MAX_BYTES}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX}
      RATE_LIMIT_WINDOW: ${RATE_LIMIT_WINDOW}
      AUTH_LOGIN_RATE_LIMIT_MAX: ${AUTH_LOGIN_RATE_LIMIT_MAX}
      AUTH_LOGIN_RATE_LIMIT_WINDOW: ${AUTH_LOGIN_RATE_LIMIT_WINDOW}
      EXPERIMENT_SALT: ${EXPERIMENT_SALT}
    ports:
      - "3000:3000"

  websocket:
    image: ghcr.io/puqme/websocket:${APP_IMAGE_TAG}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 3010
      HOST: 0.0.0.0
      LOG_LEVEL: info
      APP_ORIGIN: ${APP_ORIGIN}
      API_BASE_URL: http://api:3000
      REDIS_URL: ${REDIS_URL}
    ports:
      - "3010:3010"

volumes:
  postgres-data:
  redis-data:
