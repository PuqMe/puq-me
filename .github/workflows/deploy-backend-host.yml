name: deploy-backend-host

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - staging
    paths:
      - "apps/api/**"
      - "apps/websocket/**"
      - "packages/**"
      - "deploy/host/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"
      - "turbo.json"
      - ".github/workflows/deploy-backend-host.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Select image tag
        id: image-tag
        run: |
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "value=production" >> "$GITHUB_OUTPUT"
          else
            echo "value=staging" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy on host
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST_SSH_HOST }}
          username: ${{ secrets.HOST_SSH_USER }}
          key: ${{ secrets.HOST_SSH_PRIVATE_KEY }}
          port: ${{ secrets.HOST_SSH_PORT }}
          script: |
            cd "${{ secrets.HOST_APP_PATH }}"
            export APP_IMAGE_TAG="${{ steps.image-tag.outputs.value }}"
            docker compose --env-file .env -f deploy/host/docker-compose.yml pull
            docker compose --env-file .env -f deploy/host/docker-compose.yml up -d
            docker compose --env-file .env -f deploy/host/docker-compose.yml ps

      - name: Summarize deploy
        run: |
          echo "Backend host deployment finished for ${GITHUB_REF_NAME}." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "API and WebSocket were updated through deploy/host/docker-compose.yml." >> "$GITHUB_STEP_SUMMARY"
