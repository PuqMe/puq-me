apiVersion: apps/v1
kind: Deployment
metadata:
  name: puqme-backend
  namespace: core
spec:
  replicas: 3
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: puqme-backend
  template:
    metadata:
      labels:
        app: puqme-backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/puqme/backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - secretRef:
                name: puqme-backend-secrets
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
          startupProbe:
            httpGet:
              path: /health/live
              port: http
            failureThreshold: 30
            periodSeconds: 5
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: puqme-backend-svc
  namespace: core
  labels:
    app: puqme-backend
spec:
  selector:
    app: puqme-backend
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: puqme-backend
  namespace: core
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: puqme-backend
  minReplicas: 3
  maxReplicas: 25
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
