apiVersion: v1
kind: Secret
metadata:
  name: puqme-backend-secrets
  namespace: core
type: Opaque
stringData:
  NODE_ENV: production
  HOST: 0.0.0.0
  PORT: "3000"
  LOG_LEVEL: info
  APP_ORIGIN: https://puq.me
  JWT_SECRET: replace-with-long-random-secret
  JWT_EXPIRES_IN: 15m
  DATABASE_URL: postgresql://user:pass@postgres-rw.data.svc.cluster.local:5432/puqme
  REDIS_URL: redis://redis-master.data.svc.cluster.local:6379
  S3_ENDPOINT: https://<your-s3-endpoint>
  S3_REGION: auto
  S3_BUCKET: puqme-media
  S3_ACCESS_KEY: replace-me
  S3_SECRET_KEY: replace-me
  S3_PUBLIC_BASE_URL: https://cdn.puq.me
  WEBSOCKET_PING_MS: "30000"
  WEBSOCKET_TYPING_TTL_SECONDS: "5"
  SWIPE_RATE_LIMIT: "120"
  MESSAGE_RATE_LIMIT: "60"
  UPLOAD_URL_TTL_SECONDS: "300"
---
apiVersion: v1
kind: Secret
metadata:
  name: puqme-web-secrets
  namespace: frontend
type: Opaque
stringData:
  NEXT_PUBLIC_API_BASE_URL: https://api.puq.me
  NEXT_PUBLIC_WS_BASE_URL: wss://ws.puq.me
---
apiVersion: v1
kind: Secret
metadata:
  name: puqme-backup-secrets
  namespace: backups
type: Opaque
stringData:
  DATABASE_URL: postgresql://user:pass@postgres-rw.data.svc.cluster.local:5432/puqme
  IDRIVE_E2_ACCESS_KEY: replace-me
  IDRIVE_E2_SECRET_KEY: replace-me
  IDRIVE_E2_ENDPOINT: https://<idrive-e2-endpoint>
  IDRIVE_E2_BUCKET: puqme-backups
