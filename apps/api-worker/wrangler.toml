name = "puqme-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[vars]
APP_ORIGIN = "https://puq.me"
CDN_BASE_URL = "https://cdn.puq.me"
# Frontend Google Client ID (must match NEXT_PUBLIC_GOOGLE_CLIENT_ID in web app)
GOOGLE_CLIENT_ID_WEB = "816336980313-053klkrfv3o8qtuum0uj3rski2hnl8q7.apps.googleusercontent.com"

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "puqme-db"
database_id = "b46f1d6e-f091-49dc-8ea0-926f62ff6e22"

# KV Namespaces
[[kv_namespaces]]
binding = "KV"
id = "1ec2710bcadf478fb974f49ff971720e"

# Durable Objects
[durable_objects]
bindings = [
  { name = "CHAT_ROOM", class_name = "ChatRoom" }
]

[[migrations]]
tag = "v1"
new_classes = ["ChatRoom"]

# Secrets (set via `wrangler secret put`):
# JWT_SECRET
# JWT_REFRESH_SECRET
# S3_ENDPOINT
# S3_REGION
# S3_BUCKET
# S3_ACCESS_KEY
# S3_SECRET_KEY
# GOOGLE_CLIENT_ID
