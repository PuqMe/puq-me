name = "puqme-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[vars]
APP_ORIGIN = "https://puq.me"
CDN_BASE_URL = "https://cdn.puq.me"

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "puqme-db"
database_id = ""  # Will be filled after `wrangler d1 create puqme-db`

# KV Namespaces
[[kv_namespaces]]
binding = "KV"
id = ""  # Will be filled after `wrangler kv namespace create KV`

# Durable Objects
[durable_objects]
bindings = [
  { name = "CHAT_ROOM", class_name = "ChatRoom" }
]

[[migrations]]
tag = "v1"
new_classes = ["ChatRoom"]

# Secrets (set via `wrangler secret put`):
# JWT_SECRET
# JWT_REFRESH_SECRET
# S3_ENDPOINT
# S3_REGION
# S3_BUCKET
# S3_ACCESS_KEY
# S3_SECRET_KEY
# GOOGLE_CLIENT_ID
